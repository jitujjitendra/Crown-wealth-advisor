<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Login | Crown Wealth Advisor</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <style>
      body {
        background: linear-gradient(135deg, 
          rgba(255, 255, 255, 0.04) 0 18%, 
          transparent 18% 100%),
          linear-gradient(135deg, #d40a15 0%, #b80009 48%, #8e0007 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .login-container {
        width: 100%;
        max-width: 440px;
        background: var(--color-white);
        border-radius: var(--radius-medium);
        padding: 42px 36px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.3);
      }

      .login-header {
        text-align: center;
        margin-bottom: 32px;
      }

      .login-logo {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }

      .login-logo svg {
        width: 48px;
        height: 38px;
        fill: none;
        stroke: var(--color-black);
        stroke-width: 3.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .login-logo circle {
        fill: var(--color-gold);
        stroke: var(--color-black);
      }

      .login-logo strong {
        color: var(--color-black);
        font-size: 1.8rem;
        font-weight: 950;
        text-transform: uppercase;
      }

      .login-header h1 {
        margin: 0 0 8px;
        color: var(--color-black);
        font-size: 1.6rem;
        font-weight: 900;
      }

      .login-header p {
        margin: 0;
        color: var(--color-muted);
        font-size: 0.95rem;
      }

      .login-form {
        display: grid;
        gap: 18px;
      }

      .form-group {
        display: grid;
        gap: 8px;
      }

      .form-group label {
        color: var(--color-black);
        font-weight: 800;
        font-size: 0.92rem;
      }

      .form-group input {
        width: 100%;
        min-height: 52px;
        border: 2px solid var(--color-line);
        border-radius: var(--radius-small);
        padding: 0 16px;
        font-size: 1rem;
        outline: none;
        transition: border-color 180ms ease, box-shadow 180ms ease;
      }

      .form-group input:focus {
        border-color: var(--color-red);
        box-shadow: 0 0 0 3px rgba(201, 0, 11, 0.12);
      }

      .form-group input.error {
        border-color: #ff453a;
      }

      .password-wrapper {
        position: relative;
      }

      .toggle-password {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--color-muted);
        cursor: pointer;
        padding: 8px;
        transition: color 180ms ease;
      }

      .toggle-password:hover {
        color: var(--color-black);
      }

      .toggle-password svg {
        width: 20px;
        height: 20px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .remember-forgot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.88rem;
      }

      .remember-forgot label {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--color-muted);
        cursor: pointer;
      }

      .remember-forgot input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      .forgot-link {
        color: var(--color-red);
        font-weight: 700;
        text-decoration: none;
        transition: color 180ms ease;
      }

      .forgot-link:hover {
        color: var(--color-red-dark);
      }

      .login-button {
        width: 100%;
        min-height: 52px;
        border: none;
        border-radius: var(--radius-small);
        background: linear-gradient(135deg, var(--color-red), var(--color-red-dark));
        color: var(--color-white);
        font-size: 1rem;
        font-weight: 900;
        cursor: pointer;
        transition: transform 180ms ease, box-shadow 180ms ease;
        box-shadow: 0 10px 24px rgba(201, 0, 11, 0.2);
      }

      .login-button:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 14px 30px rgba(201, 0, 11, 0.32);
      }

      .login-button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .alert {
        padding: 14px 16px;
        border-radius: var(--radius-small);
        font-size: 0.9rem;
        margin-bottom: 20px;
        display: none;
      }

      .alert.show {
        display: block;
      }

      .alert-error {
        background: rgba(255, 69, 58, 0.15);
        color: #d32f2f;
        border: 1px solid rgba(255, 69, 58, 0.3);
      }

      .alert-success {
        background: rgba(76, 175, 80, 0.15);
        color: #2e7d32;
        border: 1px solid rgba(76, 175, 80, 0.3);
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 16px;
        margin: 28px 0;
        color: var(--color-muted);
        font-size: 0.85rem;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--color-line);
      }

      .auth-note {
        text-align: center;
        color: var(--color-muted);
        font-size: 0.85rem;
        line-height: 1.6;
        padding: 16px;
        background: var(--color-soft);
        border-radius: var(--radius-small);
      }

      .loading-spinner {
        display: none;
        justify-content: center;
        align-items: center;
        margin: 20px 0;
      }

      .loading-spinner.show {
        display: flex;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid var(--color-line);
        border-top-color: var(--color-red);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .back-home {
        text-align: center;
        margin-top: 24px;
      }

      .back-home a {
        color: var(--color-muted);
        font-size: 0.9rem;
        text-decoration: none;
        transition: color 180ms ease;
      }

      .back-home a:hover {
        color: var(--color-black);
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-header">
        <div class="login-logo">
          <svg viewBox="0 0 64 42">
            <path d="M8 31 13 9l14 16 5-20 5 20L51 9l5 22"></path>
            <path d="M9 35h46"></path>
            <circle cx="13" cy="9" r="3"></circle>
            <circle cx="32" cy="5" r="3"></circle>
            <circle cx="51" cy="9" r="3"></circle>
          </svg>
          <strong>Crown</strong>
        </div>
        <h1>Admin Login</h1>
        <p>Access your lead management dashboard</p>
      </div>

      <div id="alert" class="alert"></div>
      <div id="loadingSpinner" class="loading-spinner">
        <div class="spinner"></div>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="admin@crownwealthadvisor.com" 
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input 
              type="password" 
              id="password" 
              name="password" 
              placeholder="Enter your password" 
              autocomplete="current-password"
              required
            >
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
              <svg id="eyeIcon" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg id="eyeOffIcon" viewBox="0 0 24 24" style="display: none;">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>

        <div class="remember-forgot">
          <label>
            <input type="checkbox" id="rememberMe">
            Remember me
          </label>
          <a href="#" class="forgot-link" id="forgotPassword">Forgot Password?</a>
        </div>

        <button type="submit" class="login-button" id="loginButton">
          Sign In
        </button>
      </form>

      <div class="divider">OR</div>

      <div class="auth-note">
        <strong style="color: var(--color-black);">🔒 Secure Access</strong><br>
        This admin panel is protected by Firebase authentication. Only authorized users can access the lead management system.
      </div>

      <div class="back-home">
        <a href="../index.html">← Back to Website</a>
      </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
      // Firebase Configuration (Replace with your actual config)
      const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
      };

      // Initialize Firebase
      let auth;
      try {
        if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
          firebase.initializeApp(firebaseConfig);
          auth = firebase.auth();
          console.log("Firebase initialized successfully");
        } else {
          console.warn("Firebase not configured. Please update firebaseConfig in admin/index.html");
        }
      } catch (error) {
        console.error("Firebase initialization error:", error);
      }

      // DOM Elements
      const loginForm = document.getElementById('loginForm');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const loginButton = document.getElementById('loginButton');
      const alert = document.getElementById('alert');
      const loadingSpinner = document.getElementById('loadingSpinner');
      const togglePassword = document.getElementById('togglePassword');
      const eyeIcon = document.getElementById('eyeIcon');
      const eyeOffIcon = document.getElementById('eyeOffIcon');
      const rememberMe = document.getElementById('rememberMe');
      const forgotPassword = document.getElementById('forgotPassword');

      // Show/Hide Alert
      function showAlert(message, type = 'error') {
        alert.textContent = message;
        alert.className = `alert alert-${type} show`;
        setTimeout(() => {
          alert.classList.remove('show');
        }, 5000);
      }

      // Toggle Password Visibility
      togglePassword.addEventListener('click', () => {
        const type = passwordInput.type === 'password' ? 'text' : 'password';
        passwordInput.type = type;
        eyeIcon.style.display = type === 'password' ? 'block' : 'none';
        eyeOffIcon.style.display = type === 'password' ? 'none' : 'block';
      });

      // Load Remembered Email
      window.addEventListener('DOMContentLoaded', () => {
        const rememberedEmail = localStorage.getItem('adminEmail');
        if (rememberedEmail) {
          emailInput.value = rememberedEmail;
          rememberMe.checked = true;
        }

        // Check if user is already logged in
        if (auth) {
          auth.onAuthStateChanged((user) => {
            if (user) {
              // User is signed in, redirect to dashboard
              window.location.href = 'dashboard.html';
            }
          });
        }
      });

      // Forgot Password
      forgotPassword.addEventListener('click', async (e) => {
        e.preventDefault();
        
        const email = emailInput.value.trim();
        if (!email) {
          showAlert('Please enter your email address first', 'error');
          emailInput.focus();
          return;
        }

        if (!auth) {
          showAlert('Firebase not configured. Please contact administrator.', 'error');
          return;
        }

        try {
          await auth.sendPasswordResetEmail(email);
          showAlert('Password reset email sent! Check your inbox.', 'success');
        } catch (error) {
          console.error('Password reset error:', error);
          showAlert(error.message || 'Failed to send password reset email', 'error');
        }
      });

      // Login Form Submit
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        // Basic Validation
        if (!email || !password) {
          showAlert('Please fill in all fields', 'error');
          return;
        }

        // Check Firebase Configuration
        if (!auth) {
          showAlert('Firebase is not configured. Using demo mode...', 'error');
          
          // Demo mode for testing without Firebase
          setTimeout(() => {
            if (email === 'admin@crownwealthadvisor.com' && password === 'demo123') {
              localStorage.setItem('demoMode', 'true');
              localStorage.setItem('adminEmail', email);
              window.location.href = 'dashboard.html';
            } else {
              showAlert('Invalid demo credentials. Use admin@crownwealthadvisor.com / demo123', 'error');
            }
          }, 1000);
          return;
        }

        // Show Loading
        loginButton.disabled = true;
        loginButton.textContent = 'Signing in...';
        loadingSpinner.classList.add('show');

        try {
          // Firebase Authentication
          const userCredential = await auth.signInWithEmailAndPassword(email, password);
          const user = userCredential.user;

          // Remember Email
          if (rememberMe.checked) {
            localStorage.setItem('adminEmail', email);
          } else {
            localStorage.removeItem('adminEmail');
          }

          // Store user info
          localStorage.setItem('adminUser', JSON.stringify({
            uid: user.uid,
            email: user.email,
            displayName: user.displayName
          }));

          showAlert('Login successful! Redirecting...', 'success');

          // Redirect to Dashboard
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1000);

        } catch (error) {
          console.error('Login error:', error);
          
          let errorMessage = 'Login failed. Please try again.';
          
          switch (error.code) {
            case 'auth/user-not-found':
              errorMessage = 'No account found with this email';
              break;
            case 'auth/wrong-password':
              errorMessage = 'Incorrect password';
              break;
            case 'auth/invalid-email':
              errorMessage = 'Invalid email address';
              break;
            case 'auth/too-many-requests':
              errorMessage = 'Too many failed attempts. Please try again later';
              break;
          }

          showAlert(errorMessage, 'error');
          
          // Reset Button
          loginButton.disabled = false;
          loginButton.textContent = 'Sign In';
          loadingSpinner.classList.remove('show');
        }
      });

      // Input validation feedback
      [emailInput, passwordInput].forEach(input => {
        input.addEventListener('input', () => {
          input.classList.remove('error');
        });
      });
    </script>
  </body>
</html>
