<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Crown Wealth Advisor Admin</title>
  <link rel="stylesheet" href="admin-styles.css?v=2">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-logo">
      <img src="../assets/images/crown-logo.png" alt="Crown" onerror="this.outerHTML='<span style=&quot;font-size:2rem;font-weight:700;color:#D4A574&quot;>Crown</span>'">
      <h1>Admin Panel</h1>
      <p>Crown Wealth Advisor</p>
    </div>
    <form class="login-form" id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="admin@crown.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="login-btn">Sign In</button>
      <p class="login-error" id="loginError">Invalid email or password</p>
    </form>
    <div class="login-demo">
      <p><strong>Demo Credentials:</strong></p>
      <p>Owner: <code>admin@crown.com</code> / <code>admin123</code></p>
      <p>Admin: <code>staff@crown.com</code> / <code>staff123</code></p>
    </div>
  </div>
  <script src="admin.js?v=2"></script>
  <script>
    if (CWA_Admin.auth.isLoggedIn()) {
      window.location.href = 'dashboard.html';
    }
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var email = document.getElementById('email').value;
      var password = document.getElementById('password').value;
      if (CWA_Admin.auth.login(email, password)) {
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    });
  </script>
</body>
</html>
