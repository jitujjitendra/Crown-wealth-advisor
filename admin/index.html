<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Crown Wealth Advisor Admin</title>
  <link rel="stylesheet" href="admin-styles.css?v=5">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-logo">
      <img src="../assets/images/crown-logo.png" alt="Crown" onerror="this.outerHTML='<span style=&quot;font-size:2rem;font-weight:700;color:#D4A574&quot;>Crown</span>'">
      <h1>Admin Panel</h1>
      <p>Crown Wealth Advisor</p>
    </div>
    <form class="login-form" id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="admin@crown.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="login-btn">Sign In</button>
      <p class="login-error" id="loginError">Invalid email or password</p>
    </form>
    <div style="text-align:center;margin-top:20px;">
      <a href="../index.html" style="color:#c9000b;font-weight:700;text-decoration:none;font-size:0.92rem;">&#127968; Back to Website</a>
    </div>
  </div>
  <script src="admin.js?v=8"></script>
  <script>
    (async function() {
      var errEl = document.getElementById('loginError');
      // If already logged in, go straight to the dashboard.
      try {
        var existing = await CWA_Admin.auth.session();
        if (existing) { window.location.href = 'dashboard.html'; return; }
      } catch (e) { /* not logged in / network issue - stay on login */ }

      document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        var email = document.getElementById('email').value;
        var password = document.getElementById('password').value;
        errEl.style.display = 'none';
        try {
          await CWA_Admin.auth.login(email, password);
          window.location.href = 'dashboard.html';
        } catch (err) {
          errEl.textContent = err.message || 'Invalid email or password';
          errEl.style.display = 'block';
        }
      });
    })();
  </script>
</body>
</html>
