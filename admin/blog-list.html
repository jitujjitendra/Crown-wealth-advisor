  <main class="admin-main">
    <header class="admin-header">
      <h1>All Blog Posts</h1>
      <div class="header-actions">
        <div class="search-box" style="margin:0;"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg><input type="search" id="searchInput" placeholder="Search blogs..."></div>
        <select id="categoryFilter" class="form-input" style="width:auto;padding:10px 14px;border-radius:8px;border:2px solid #e0e0e0;">
          <option value="">All Categories</option>
          <option value="Insurance">Insurance</option>
          <option value="Loans">Loans</option>
          <option value="Investments">Investments</option>
          <option value="General">General</option>
        </select>
        <a href="blog-submission.html" class="btn btn-primary">+ New Post</a>
      </div>
    </header>

    <div class="table-container">
      <table class="leads-table" id="blogsTable">
        <thead><tr><th>Status</th><th>Title</th><th>Category</th><th>Author</th><th>Date</th><th>Actions</th></tr></thead>
        <tbody id="blogsTableBody">
          <tr class="no-data"><td colspan="6"><div class="empty-state"><p>Loading blogs...</p></div></td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="../assets/js/role-permissions.js"></script>
  <script src="../assets/js/feature-config.js"></script>
  <script src="../assets/js/blog-system.js"></script>
  <script>
    (function() {
      CWA_Permissions.loadUserRole(function(user) {
        document.getElementById('adminName').textContent = user.displayName || 'Admin';
        document.getElementById('adminEmail').textContent = user.email || '';
        CWA_Permissions.hideElementsWithoutPermission();
        CWA_FeatureConfig.applyFeatureFlags();
        loadBlogs();
      });

      function loadBlogs() {
        var filters = {};
        var search = document.getElementById('searchInput').value.trim();
        var category = document.getElementById('categoryFilter').value;
        if (search) filters.search = search;
        if (category) filters.category = category;

        CWA_BlogSystem.getBlogs(filters, function(err, blogs) { renderTable(blogs || []); });
      }

      function renderTable(blogs) {
        var tbody = document.getElementById('blogsTableBody');
        if (blogs.length === 0) { tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><p>No blogs found</p></div></td></tr>'; return; }
        var html = '';
        blogs.forEach(function(blog) {
          var statusClass = blog.status === 'published' ? 'success' : blog.status === 'rejected' ? 'rejected' : blog.status === 'pending' ? 'new' : 'wip';
          html += '<tr><td><span class="status-badge ' + statusClass + '">' + blog.status + '</span></td>' +
            '<td><strong>' + blog.title + '</strong></td>' +
            '<td>' + blog.category + '</td><td>' + blog.author + '</td>' +
            '<td>' + new Date(blog.createdAt).toLocaleDateString() + '</td>' +
            '<td><button class="action-btn" onclick="editBlog(\'' + blog.id + '\')">Edit</button>';
          if (CWA_Permissions.hasPermission('DELETE_BLOG')) {
            html += '<button class="action-btn" onclick="deleteBlog(\'' + blog.id + '\')">Delete</button>';
          }
          html += '</td></tr>';
        });
        tbody.innerHTML = html;
      }

      window.editBlog = function(id) { window.location.href = 'blog-submission.html?edit=' + id; };
      window.deleteBlog = function(id) {
        if (confirm('Are you sure you want to delete this blog?')) {
          CWA_BlogSystem.deleteBlog(id, function() { loadBlogs(); });
        }
      };

      document.getElementById('searchInput').addEventListener('input', loadBlogs);
      document.getElementById('categoryFilter').addEventListener('change', loadBlogs);
      document.getElementById('logoutBtn').addEventListener('click', function() { sessionStorage.clear(); window.location.href = 'index.html'; });
    })();
  </script>
