<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Blogs | Crown Wealth Advisor Admin</title>
  <link rel="stylesheet" href="admin-styles.css?v=2">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <img src="../assets/images/crown-logo.png" alt="Crown" onerror="this.outerHTML='<span style=&quot;color:#D4A574;font-weight:700;&quot;>Crown</span>'">
        <div><h2>Crown Admin</h2><small>Wealth Advisor</small></div>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section">Main</div>
        <a href="dashboard.html"><span class="nav-icon">&#128200;</span> Dashboard</a>
        <a href="lead-details.html"><span class="nav-icon">&#128101;</span> Leads</a>
        <a href="assignments.html"><span class="nav-icon">&#128203;</span> Assignments</a>
        <div class="sidebar-section">Content</div>
        <a href="blog-write.html"><span class="nav-icon">&#9997;</span> Write Blog</a>
        <a href="blog-approval.html"><span class="nav-icon">&#9989;</span> Blog Approval</a>
        <a href="blog-list.html" class="active"><span class="nav-icon">&#128220;</span> All Blogs</a>
        <div class="sidebar-section">Management</div>
        <a href="users.html" data-role="owner"><span class="nav-icon">&#128100;</span> Users</a>
        <a href="analytics.html"><span class="nav-icon">&#128202;</span> Analytics</a>
        <a href="notifications.html"><span class="nav-icon">&#128276;</span> Notifications</a>
        <a href="announcements.html"><span class="nav-icon">&#128227;</span> Announcements <span class="nav-badge announcement-badge">0</span></a>
        <a href="settings.html" data-role="owner"><span class="nav-icon">&#9881;</span> Settings</a>
      </nav>
      <div class="sidebar-footer">
        <a href="../index.html"><span>&#127968;</span> View Website</a>
        <a href="#" onclick="CWA_Admin.auth.logout();return false;"><span>&#128682;</span> Logout</a>
      </div>
    </aside>
    <div class="admin-main">
      <div class="admin-topbar">
        <div class="topbar-left"><h1>All Blogs</h1><p>Manage all blog posts</p></div>
        <div class="topbar-right">
          <div class="topbar-user">
            <div class="topbar-avatar"></div>
            <div><span class="topbar-user-name"></span><br><small class="topbar-user-role text-muted"></small></div>
          </div>
        </div>
      </div>
      <div class="admin-content">
        <div class="tab-nav" id="blogTabs">
          <button class="tab-btn active" data-filter="all">All</button>
          <button class="tab-btn" data-filter="draft">Draft</button>
          <button class="tab-btn" data-filter="pending">Pending</button>
          <button class="tab-btn" data-filter="approved">Approved</button>
          <button class="tab-btn" data-filter="rejected">Rejected</button>
        </div>
        <div class="admin-card">
          <div class="card-body" style="padding:0;overflow-x:auto;">
            <table class="admin-table">
              <thead>
                <tr><th>Title</th><th>Category</th><th>Author</th><th>Status</th><th>Date</th><th>Action</th></tr>
              </thead>
              <tbody id="blogTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="admin.js?v=3"></script>
  <script>
    (async function() {
      var me = await CWA_Admin.guardPage();
      if (!me) return;
      var esc = CWA_Admin.ui.escapeHtml;
      var currentFilter = 'all';

      async function render() {
        var tbody = document.getElementById('blogTable');
        tbody.innerHTML = '<tr><td colspan="6" class="text-muted" style="padding:16px;">Loading...</td></tr>';
        try {
          var status = currentFilter === 'all' ? '' : currentFilter;
          var blogs = await CWA_Admin.blogs.list(status);
          if (!blogs.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-muted" style="padding:16px;">No blogs found.</td></tr>';
            return;
          }
          var owner = CWA_Admin.isOwner();
          tbody.innerHTML = blogs.map(function(b) {
            var actions = '<a href="blog-write.html?edit=' + encodeURIComponent(b.id) + '" class="btn btn-sm btn-outline">Edit</a>';
            if (owner) {
              actions += ' <button class="btn btn-sm btn-danger" onclick="deleteBlog(\'' + esc(b.id) + '\')">Delete</button>';
            }
            return '<tr><td><strong>' + esc(b.title) + '</strong></td><td>' + esc(b.category) + '</td><td>' + esc(b.author) + '</td><td><span class="status-badge ' + esc(b.status) + '">' + esc(b.status) + '</span></td><td>' + CWA_Admin.ui.formatDate(b.created_at) + '</td><td>' + actions + '</td></tr>';
          }).join('');
        } catch (e) {
          tbody.innerHTML = '<tr><td colspan="6" class="text-muted" style="padding:16px;">Could not load blogs: ' + esc(e.message) + '</td></tr>';
        }
      }

      window.deleteBlog = async function(id) {
        if (!confirm('Delete this blog? This cannot be undone.')) return;
        try {
          await CWA_Admin.blogs.remove(id);
          await render();
        } catch (e) { alert('Could not delete: ' + e.message); }
      };

      document.querySelectorAll('#blogTabs .tab-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.querySelectorAll('#blogTabs .tab-btn').forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          currentFilter = btn.getAttribute('data-filter');
          render();
        });
      });

      render();
    })();
  </script>
</body>
</html>
