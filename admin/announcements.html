  <main class="admin-main">
    <header class="admin-header">
      <h1>Announcements</h1>
      <div class="header-actions"><button class="btn btn-primary" id="addAnnouncementBtn">+ Add Announcement</button></div>
    </header>

    <!-- Add/Edit Form -->
    <div class="stat-card" id="announcementForm" style="padding:24px;margin-bottom:24px;display:none;">
      <h3 id="formTitle">New Announcement</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;">
        <div class="form-group"><label>Title</label><input type="text" id="annTitle" class="form-input" placeholder="Announcement title"></div>
        <div class="form-group"><label>Type</label><select id="annType" class="form-input"><option value="info">Info</option><option value="promotion">Promotion</option><option value="alert">Alert</option><option value="update">Update</option></select></div>
        <div class="form-group" style="grid-column:span 2;"><label>Message</label><textarea id="annMessage" class="form-input" rows="3" placeholder="Announcement message..."></textarea></div>
        <div class="form-group"><label>Link (optional)</label><input type="text" id="annLink" class="form-input" placeholder="URL or page path"></div>
        <div class="form-group"><label>Active</label><select id="annActive" class="form-input"><option value="true">Active</option><option value="false">Inactive</option></select></div>
        <div class="form-group"><label>Start Date</label><input type="date" id="annStart" class="form-input"></div>
        <div class="form-group"><label>End Date</label><input type="date" id="annEnd" class="form-input"></div>
      </div>
      <div style="margin-top:16px;display:flex;gap:12px;">
        <button class="btn btn-primary" id="saveAnnBtn">Save</button>
        <button class="btn btn-secondary" id="cancelAnnBtn">Cancel</button>
      </div>
    </div>

    <!-- Announcements List -->
    <div id="announcementsList"></div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="../assets/js/role-permissions.js"></script>
  <script src="../assets/js/feature-config.js"></script>
  <script src="../assets/js/announcements.js"></script>
  <script>
    (function() {
      var editingId = null;

      CWA_Permissions.loadUserRole(function(user) {
        document.getElementById('adminName').textContent = user.displayName || 'Admin';
        document.getElementById('adminEmail').textContent = user.email || '';
        CWA_Permissions.hideElementsWithoutPermission();
        CWA_FeatureConfig.applyFeatureFlags();
        loadAnnouncements();
      });

      function loadAnnouncements() {
        var announcements = CWA_Announcements.getAnnouncements();
        var list = document.getElementById('announcementsList');
        if (announcements.length === 0) {
          list.innerHTML = '<div class="stat-card" style="padding:40px;text-align:center;"><p>No announcements yet</p></div>';
          return;
        }
        var html = '';
        announcements.forEach(function(ann) {
          var statusColor = ann.active ? '#4caf50' : '#999';
          html += '<div class="stat-card" style="padding:20px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;">' +
            '<div><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + statusColor + ';margin-right:12px;"></span>' +
            '<strong>' + ann.title + '</strong> <span style="color:#666;margin-left:8px;">[' + ann.type + ']</span>' +
            '<p style="margin:4px 0 0 22px;color:#666;font-size:0.9rem;">' + ann.message + '</p></div>' +
            '<div style="display:flex;gap:8px;">' +
            '<button class="action-btn" onclick="editAnn(\'' + ann.id + '\')">Edit</button>' +
            '<button class="action-btn" onclick="toggleAnn(\'' + ann.id + '\',' + !ann.active + ')">' + (ann.active ? 'Deactivate' : 'Activate') + '</button>' +
            '<button class="action-btn" onclick="deleteAnn(\'' + ann.id + '\')">Delete</button></div></div>';
        });
        list.innerHTML = html;
      }

      document.getElementById('addAnnouncementBtn').addEventListener('click', function() {
        editingId = null;
        document.getElementById('formTitle').textContent = 'New Announcement';
        document.getElementById('annTitle').value = '';
        document.getElementById('annMessage').value = '';
        document.getElementById('annType').value = 'info';
        document.getElementById('annLink').value = '';
        document.getElementById('annActive').value = 'true';
        document.getElementById('annStart').value = new Date().toISOString().split('T')[0];
        document.getElementById('annEnd').value = '';
        document.getElementById('announcementForm').style.display = 'block';
      });

      document.getElementById('cancelAnnBtn').addEventListener('click', function() {
        document.getElementById('announcementForm').style.display = 'none';
      });

      document.getElementById('saveAnnBtn').addEventListener('click', function() {
        var data = {
          title: document.getElementById('annTitle').value.trim(),
          message: document.getElementById('annMessage').value.trim(),
          type: document.getElementById('annType').value,
          link: document.getElementById('annLink').value.trim(),
          active: document.getElementById('annActive').value === 'true',
          startDate: document.getElementById('annStart').value,
          endDate: document.getElementById('annEnd').value
        };
        if (!data.title || !data.message) { alert('Title and message are required.'); return; }

        if (editingId) {
          CWA_Announcements.updateAnnouncement(editingId, data, function() {
            document.getElementById('announcementForm').style.display = 'none';
            loadAnnouncements();
          });
        } else {
          CWA_Announcements.createAnnouncement(data, function() {
            document.getElementById('announcementForm').style.display = 'none';
            loadAnnouncements();
          });
        }
      });

      window.editAnn = function(id) {
        var announcements = CWA_Announcements.getAnnouncements();
        var ann = announcements.find(function(a) { return a.id === id; });
        if (!ann) return;
        editingId = id;
        document.getElementById('formTitle').textContent = 'Edit Announcement';
        document.getElementById('annTitle').value = ann.title;
        document.getElementById('annMessage').value = ann.message;
        document.getElementById('annType').value = ann.type;
        document.getElementById('annLink').value = ann.link || '';
        document.getElementById('annActive').value = String(ann.active);
        document.getElementById('annStart').value = ann.startDate || '';
        document.getElementById('annEnd').value = ann.endDate || '';
        document.getElementById('announcementForm').style.display = 'block';
      };

      window.toggleAnn = function(id, active) {
        CWA_Announcements.updateAnnouncement(id, { active: active }, function() { loadAnnouncements(); });
      };

      window.deleteAnn = function(id) {
        if (confirm('Delete this announcement?')) {
          CWA_Announcements.deleteAnnouncement(id, function() { loadAnnouncements(); });
        }
      };

      document.getElementById('logoutBtn').addEventListener('click', function() { sessionStorage.clear(); window.location.href = 'index.html'; });
    })();
  </script>
