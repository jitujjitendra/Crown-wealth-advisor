  <!-- Main Content -->
  <main class="admin-main">
    <header class="admin-header">
      <h1>Write Blog Post</h1>
      <div class="header-actions">
        <button class="btn btn-secondary" id="saveDraftBtn">Save as Draft</button>
        <button class="btn btn-primary" id="submitBtn">Submit for Approval</button>
      </div>
    </header>

    <div class="blog-editor-container">
      <div class="editor-main">
        <div class="form-group">
          <label for="blogTitle">Blog Title</label>
          <input type="text" id="blogTitle" class="form-input" placeholder="Enter blog title..." required>
        </div>

        <div class="form-group">
          <label for="blogContent">Content</label>
          <textarea id="blogContent" class="form-textarea"></textarea>
        </div>
      </div>

      <div class="editor-sidebar">
        <div class="sidebar-card">
          <h3>Post Settings</h3>
          
          <div class="form-group">
            <label for="blogCategory">Category</label>
            <select id="blogCategory" class="form-input">
              <option value="Insurance">Insurance</option>
              <option value="Loans">Loans</option>
              <option value="Investments">Investments</option>
              <option value="Calculators">Calculators</option>
              <option value="General">General</option>
            </select>
          </div>

          <div class="form-group">
            <label for="blogTags">Tags (comma separated)</label>
            <input type="text" id="blogTags" class="form-input" placeholder="e.g. health, family, tips">
          </div>

          <div class="form-group">
            <label for="blogImage">Featured Image URL</label>
            <input type="url" id="blogImage" class="form-input" placeholder="https://example.com/image.jpg">
          </div>

          <div class="form-group">
            <label for="blogExcerpt">Short Excerpt</label>
            <textarea id="blogExcerpt" class="form-input" rows="3" placeholder="Brief summary for blog cards..."></textarea>
          </div>

          <div class="form-group">
            <label for="blogMeta">SEO Meta Description</label>
            <textarea id="blogMeta" class="form-input" rows="3" placeholder="Meta description for search engines (150-160 chars)..." maxlength="160"></textarea>
          </div>
        </div>
      </div>
    </div>

    <div id="statusMessage" class="status-message" style="display:none;"></div>
  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script src="../assets/js/role-permissions.js"></script>
  <script src="../assets/js/feature-config.js"></script>
  <script src="../assets/js/blog-system.js"></script>
  <script>
    (function() {
      // Initialize TinyMCE
      if (typeof tinymce !== 'undefined') {
        tinymce.init({
          selector: '#blogContent',
          height: 500,
          menubar: true,
          plugins: 'anchor autolink charmap codesample emoticons image link lists media searchreplace table visualblocks wordcount',
          toolbar: 'undo redo | blocks fontfamily fontsize | bold italic underline strikethrough | link image media table | align lineheight | numlist bullist indent outdent | emoticons charmap | removeformat',
          content_style: 'body { font-family: "Segoe UI", Roboto, Arial, sans-serif; font-size: 16px; line-height: 1.6; }',
          promotion: false,
          branding: false
        });
      }

      // Load user permissions
      CWA_Permissions.loadUserRole(function(user) {
        document.getElementById('adminName').textContent = user.displayName || 'Admin';
        document.getElementById('adminEmail').textContent = user.email || '';
        document.getElementById('profileAvatar') && (document.getElementById('profileAvatar').textContent = (user.displayName || 'A').charAt(0));
        CWA_Permissions.hideElementsWithoutPermission();
        CWA_FeatureConfig.applyFeatureFlags();
      });

      function showMessage(msg, type) {
        var el = document.getElementById('statusMessage');
        el.textContent = msg;
        el.className = 'status-message ' + (type || 'info');
        el.style.display = 'block';
        setTimeout(function() { el.style.display = 'none'; }, 4000);
      }

      function getBlogData(status) {
        var content = typeof tinymce !== 'undefined' && tinymce.get('blogContent') ? tinymce.get('blogContent').getContent() : document.getElementById('blogContent').value;
        var tags = document.getElementById('blogTags').value.split(',').map(function(t) { return t.trim(); }).filter(Boolean);
        var user = CWA_Permissions.getCurrentUser();

        return {
          title: document.getElementById('blogTitle').value.trim(),
          content: content,
          excerpt: document.getElementById('blogExcerpt').value.trim(),
          category: document.getElementById('blogCategory').value,
          tags: tags,
          featuredImage: document.getElementById('blogImage').value.trim(),
          metaDescription: document.getElementById('blogMeta').value.trim(),
          author: user.displayName || user.email || 'Admin',
          authorId: user.uid || '',
          status: status
        };
      }

      document.getElementById('saveDraftBtn').addEventListener('click', function() {
        var data = getBlogData('draft');
        if (!data.title) { showMessage('Please enter a blog title.', 'error'); return; }
        CWA_BlogSystem.createBlog(data, function(err, blog) {
          if (err) { showMessage('Error saving draft: ' + err.message, 'error'); return; }
          showMessage('Blog saved as draft successfully!', 'success');
        });
      });

      document.getElementById('submitBtn').addEventListener('click', function() {
        var data = getBlogData('pending');
        if (!data.title) { showMessage('Please enter a blog title.', 'error'); return; }
        if (!data.content) { showMessage('Please add blog content.', 'error'); return; }
        CWA_BlogSystem.createBlog(data, function(err, blog) {
          if (err) { showMessage('Error submitting blog: ' + err.message, 'error'); return; }
          showMessage('Blog submitted for approval!', 'success');
          // Clear form
          document.getElementById('blogTitle').value = '';
          document.getElementById('blogTags').value = '';
          document.getElementById('blogImage').value = '';
          document.getElementById('blogExcerpt').value = '';
          document.getElementById('blogMeta').value = '';
          if (typeof tinymce !== 'undefined' && tinymce.get('blogContent')) tinymce.get('blogContent').setContent('');
        });
      });

      document.getElementById('logoutBtn').addEventListener('click', function() {
        sessionStorage.clear();
        window.location.href = 'index.html';
      });
    })();
  </script>
