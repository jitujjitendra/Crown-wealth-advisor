  <!-- Main Content -->
  <main class="admin-main">
    <header class="admin-header">
      <h1>Blog Approval</h1>
      <div class="header-actions">
        <div class="filters">
          <button class="filter-btn active" data-filter="pending">Pending</button>
          <button class="filter-btn" data-filter="approved">Approved</button>
          <button class="filter-btn" data-filter="rejected">Rejected</button>
          <button class="filter-btn" data-filter="all">All</button>
        </div>
      </div>
    </header>

    <div class="blog-approval-grid" id="blogGrid">
      <div class="empty-state">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
        <p>No blogs pending approval</p>
        <small>Blogs submitted by admins will appear here</small>
      </div>
    </div>

    <!-- Preview Modal -->
    <div class="modal-overlay" id="previewModal" style="display:none;">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="previewTitle">Blog Preview</h2>
          <button class="modal-close" id="closePreview">&times;</button>
        </div>
        <div class="modal-body">
          <div class="preview-meta">
            <span id="previewCategory" class="status-badge new"></span>
            <span id="previewAuthor"></span>
            <span id="previewDate"></span>
          </div>
          <div id="previewContent" class="preview-content"></div>
        </div>
        <div class="modal-footer" data-permission="APPROVE_BLOG">
          <button class="btn btn-secondary" id="rejectBlogBtn">Reject</button>
          <button class="btn btn-primary" id="approveBlogBtn">Approve & Publish</button>
        </div>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="../assets/js/role-permissions.js"></script>
  <script src="../assets/js/feature-config.js"></script>
  <script src="../assets/js/blog-system.js"></script>
  <script>
    (function() {
      var currentFilter = 'pending';
      var currentBlogId = null;

      CWA_Permissions.loadUserRole(function(user) {
        document.getElementById('adminName').textContent = user.displayName || 'Admin';
        document.getElementById('adminEmail').textContent = user.email || '';
        CWA_Permissions.hideElementsWithoutPermission();
        CWA_FeatureConfig.applyFeatureFlags();
        loadBlogs();
      });

      function loadBlogs() {
        var filter = currentFilter === 'all' ? {} : { status: currentFilter };
        CWA_BlogSystem.getBlogs(filter, function(err, blogs) {
          renderBlogs(blogs || []);
        });
      }

      function renderBlogs(blogs) {
        var grid = document.getElementById('blogGrid');
        if (blogs.length === 0) {
          grid.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg><p>No blogs found</p><small>No blogs match the current filter</small></div>';
          return;
        }

        var html = '';
        blogs.forEach(function(blog) {
          var statusClass = blog.status === 'approved' || blog.status === 'published' ? 'success' : blog.status === 'rejected' ? 'rejected' : blog.status === 'pending' ? 'new' : 'wip';
          html += '<div class="blog-approval-card">' +
            '<div class="blog-card-header"><span class="status-badge ' + statusClass + '">' + blog.status.toUpperCase() + '</span><span class="blog-date">' + new Date(blog.createdAt).toLocaleDateString() + '</span></div>' +
            '<h3>' + blog.title + '</h3>' +
            '<p class="blog-excerpt">' + (blog.excerpt || 'No excerpt provided') + '</p>' +
            '<div class="blog-card-meta"><span>By: ' + blog.author + '</span><span>Category: ' + blog.category + '</span></div>' +
            '<div class="blog-card-actions">' +
            '<button class="action-btn" onclick="previewBlog(\'' + blog.id + '\')">Preview</button>';
          if (CWA_Permissions.hasPermission('APPROVE_BLOG') && blog.status === 'pending') {
            html += '<button class="action-btn primary" onclick="quickApprove(\'' + blog.id + '\')">Approve</button>' +
              '<button class="action-btn" onclick="quickReject(\'' + blog.id + '\')">Reject</button>';
          }
          html += '</div></div>';
        });
        grid.innerHTML = html;
      }

      window.previewBlog = function(blogId) {
        currentBlogId = blogId;
        CWA_BlogSystem.getBlogById(blogId, function(err, blog) {
          if (!blog) return;
          document.getElementById('previewTitle').textContent = blog.title;
          document.getElementById('previewCategory').textContent = blog.category;
          document.getElementById('previewAuthor').textContent = 'By: ' + blog.author;
          document.getElementById('previewDate').textContent = new Date(blog.createdAt).toLocaleDateString();
          document.getElementById('previewContent').innerHTML = blog.content;
          document.getElementById('previewModal').style.display = 'flex';
        });
      };

      window.quickApprove = function(blogId) {
        CWA_BlogSystem.publishBlog(blogId, function(err) {
          if (!err) loadBlogs();
        });
      };

      window.quickReject = function(blogId) {
        var reason = prompt('Rejection reason (optional):');
        CWA_BlogSystem.rejectBlog(blogId, reason || '', function(err) {
          if (!err) loadBlogs();
        });
      };

      document.getElementById('closePreview').addEventListener('click', function() {
        document.getElementById('previewModal').style.display = 'none';
      });

      document.getElementById('approveBlogBtn').addEventListener('click', function() {
        if (currentBlogId) {
          CWA_BlogSystem.publishBlog(currentBlogId, function(err) {
            if (!err) { document.getElementById('previewModal').style.display = 'none'; loadBlogs(); }
          });
        }
      });

      document.getElementById('rejectBlogBtn').addEventListener('click', function() {
        if (currentBlogId) {
          var reason = prompt('Rejection reason (optional):');
          CWA_BlogSystem.rejectBlog(currentBlogId, reason || '', function(err) {
            if (!err) { document.getElementById('previewModal').style.display = 'none'; loadBlogs(); }
          });
        }
      });

      // Filter buttons
      document.querySelectorAll('[data-filter]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.querySelectorAll('[data-filter]').forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          currentFilter = btn.getAttribute('data-filter');
          loadBlogs();
        });
      });

      document.getElementById('logoutBtn').addEventListener('click', function() {
        sessionStorage.clear();
        window.location.href = 'index.html';
      });
    })();
  </script>
